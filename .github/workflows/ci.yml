name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install check tools
        run: pip install black pytest
      - name: Format check
        run: black --check scribe tests
      - name: Unit tests (pure-Python modules only, no GPU)
        run: python -m pytest tests -q
